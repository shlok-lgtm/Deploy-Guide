name: audit
on: [push, pull_request]
jobs:
  audit-async:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Audit await-in-args bug pattern
        run: python3 scripts/audit_await_in_args.py --quiet

  audit-sync-db-advisory:
    # ADVISORY MODE — does not fail build.
    # Promote to blocking (remove `|| true`) once violations < 50
    # and the count has been stable for 2 weeks. Tracked in
    # docs/incidents/2026-05-04-phase3-closure.md (TBD).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Audit sync-DB-in-async (advisory)
        run: python3 scripts/audit_sync_db_in_async.py || true

  bare-except-gate:
    # Blocks merges that increase bare `except:` count above the threshold,
    # and fails on any regression vs. the prior committed count.
    # Threshold (150) is set just above the current ~145 debug_only remnants
    # in dirs not yet cleaned up by PRs #103-#107. Lower as cleanup continues.
    needs: [audit-async, audit-sync-db-advisory]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Audit bare-except (gate)
        run: python tools/audit/bare_except_audit.py app/ --max-debug-only 150 --fail-on-regression

  oracle-keys-parity:
    # Asserts both Python (app/oracle_keys.py) and TypeScript
    # (keeper/optionC_keys.ts) implementations of the entityId scheme
    # match docs/oracle_option_c_golden_vectors.json byte-for-byte.
    # Fails on any divergence — the gate the runbook §3 calls for.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Python deps
        run: pip install pytest "eth-hash[pycryptodome]>=0.7.0" psycopg2-binary requests
      - name: Python entityId golden vectors
        run: pytest tests/test_oracle_keys.py -v
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install Node deps
        run: npm install --no-audit --no-fund
      - name: TypeScript entityId golden vectors
        run: npm run test:keeper
